<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart Icon Test</title>
    <link rel="stylesheet" href="/assets/css/fontawesome.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1f2937;
            color: white;
        }
        .icon-test {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: #374151;
            border-radius: 6px;
        }
        .icon-test i {
            margin-right: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Pie Chart Icon Test</h1>
    
    <div class="icon-test">
        <i class="fas fa-chart-pie"></i>
        <span>fa-chart-pie (Pie Chart Icon)</span>
    </div>
    
    <div class="icon-test">
        <i class="fas fa-analytics"></i>
        <span>fa-analytics (Previous Icon)</span>
    </div>
    
    <div class="icon-test">
        <i class="fas fa-chart-bar"></i>
        <span>fa-chart-bar (Bar Chart - for comparison)</span>
    </div>
    
    <div class="icon-test">
        <i class="fas fa-chart-line"></i>
        <span>fa-chart-line (Line Chart - for comparison)</span>
    </div>
    
    <p>Check if the pie chart icon (first item) is visible next to "fa-chart-pie".</p>
</body>
</html>
