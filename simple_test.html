<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Property Form Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6">Simple Property Form Test</h1>
        
        <form id="simple-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Property Name</label>
                <input type="text" name="property_name" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                <input type="text" name="address" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Property Type</label>
                <select name="property_type" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required>
                    <option value="">Select Type</option>
                    <option value="apartment">Apartment</option>
                    <option value="detached_house">Detached House</option>
                    <option value="office_building">Office Building</option>
                    <option value="warehouse">Warehouse</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Yearly Rent</label>
                <input type="number" name="yearly_rent" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Water Availability</label>
                <select name="water_availability" class="w-full px-3 py-2 border border-gray-300 rounded-lg" required>
                    <option value="">Select option</option>
                    <option value="in_building">In Building</option>
                    <option value="borehole">Borehole</option>
                    <option value="water_tank">Water Tank</option>
                    <option value="none">None</option>
                </select>
            </div>
            
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Submit Property
            </button>
        </form>
        
        <div id="result" class="mt-6 p-4 rounded" style="display: none;"></div>
    </div>

    <script>
        console.log('Simple form script loaded');
        
        document.getElementById('simple-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('Form submitted');
            
            const formData = new FormData(this);
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'mt-6 p-4 rounded bg-blue-100';
            resultDiv.innerHTML = 'Submitting...';
            
            try {
                console.log('Sending request to /properties');
                
                const response = await fetch('/properties', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest',
                        'Accept': 'application/json'
                    }
                });
                
                console.log('Response received:', response.status, response.statusText);
                
                const contentType = response.headers.get('content-type');
                console.log('Content-Type:', contentType);
                
                let data;
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                    console.log('JSON response:', data);
                } else {
                    const text = await response.text();
                    console.log('Text response (first 200 chars):', text.substring(0, 200));
                    data = { 
                        success: response.ok, 
                        message: response.ok ? 'Property saved successfully' : 'Server error'
                    };
                }
                
                if (response.ok) {
                    resultDiv.className = 'mt-6 p-4 rounded bg-green-100';
                    resultDiv.innerHTML = `
                        <h3 class="text-green-800 font-bold">Success!</h3>
                        <p>Property created successfully.</p>
                        <pre class="text-sm mt-2">${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'mt-6 p-4 rounded bg-red-100';
                    resultDiv.innerHTML = `
                        <h3 class="text-red-800 font-bold">Error!</h3>
                        <p>Status: ${response.status}</p>
                        <pre class="text-sm mt-2">${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('Network error:', error);
                resultDiv.className = 'mt-6 p-4 rounded bg-red-100';
                resultDiv.innerHTML = `
                    <h3 class="text-red-800 font-bold">Network Error!</h3>
                    <p>${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
