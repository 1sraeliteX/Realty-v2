<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <!-- Mobile sidebar backdrop -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-gray-600 bg-opacity-75 z-40 lg:hidden hidden"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 z-50 w-64 h-screen bg-white border-r border-gray-200 transform -translate-x-full transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-0">
        <!-- Sidebar header -->
        <div class="flex items-center justify-between h-16 px-6 border-b border-gray-200">
            <div class="flex items-center">
                <i class="fas fa-building text-blue-600 text-xl mr-3"></i>
                <span class="text-xl font-semibold text-gray-900">Cornerstone</span>
            </div>
            <button id="close-sidebar" class="lg:hidden text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <!-- Navigation -->
        <nav class="p-4 space-y-2">
            <a href="/admin/dashboard" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg bg-blue-50 text-blue-700">
                <i class="fas fa-home mr-3"></i>
                Dashboard
            </a>
            <a href="/admin/properties" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-100">
                <i class="fas fa-building mr-3"></i>
                Properties
            </a>
            <a href="/admin/tenants" class="flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-100">
                <i class="fas fa-users mr-3"></i>
                Tenants
            </a>
        </nav>
    </aside>
    
    <!-- Main content -->
    <div class="lg:pl-64">
        <!-- Top navigation -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between h-16 px-4 sm:px-6">
                <!-- Left side -->
                <div class="flex items-center">
                    <button id="open-sidebar" class="lg:hidden text-gray-500 hover:text-gray-700 mr-4">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    
                    <h1 class="text-xl font-semibold text-gray-900">Sidebar Test</h1>
                </div>
            </div>
        </header>
        
        <!-- Main content area -->
        <main class="p-4 sm:p-6 lg:p-8">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-2xl font-bold text-gray-900 mb-4">Sidebar Test Page</h2>
                <p class="text-gray-600 mb-4">Test the hamburger menu functionality:</p>
                
                <div class="space-y-4">
                    <div class="p-4 bg-blue-50 rounded-lg">
                        <h3 class="font-semibold text-blue-900 mb-2">On Desktop:</h3>
                        <p class="text-blue-700">Sidebar should always be visible</p>
                    </div>
                    
                    <div class="p-4 bg-green-50 rounded-lg">
                        <h3 class="font-semibold text-green-900 mb-2">On Mobile:</h3>
                        <p class="text-green-700">Click the hamburger menu (☰) to open sidebar</p>
                        <p class="text-green-700">Click the X button or backdrop to close</p>
                    </div>
                    
                    <button onclick="testSidebar()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        Test Sidebar Toggle
                    </button>
                </div>
            </div>
        </main>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Sidebar functionality
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    const openBtn = document.getElementById('open-sidebar');
    const closeBtn = document.getElementById('close-sidebar');
    
    console.log('Sidebar elements found:', {
        sidebar: !!sidebar,
        backdrop: !!backdrop,
        openBtn: !!openBtn,
        closeBtn: !!closeBtn
    });
    
    openBtn?.addEventListener('click', () => {
        console.log('Open button clicked');
        sidebar.classList.remove('-translate-x-full');
        backdrop.classList.remove('hidden');
    });
    
    closeBtn?.addEventListener('click', closeSidebar);
    backdrop?.addEventListener('click', closeSidebar);
    
    function closeSidebar() {
        console.log('Closing sidebar');
        sidebar.classList.add('-translate-x-full');
        backdrop.classList.add('hidden');
    }
    
    // Test function
    window.testSidebar = function() {
        console.log('Test function called');
        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
            showToast('Sidebar opened');
        } else {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('hidden');
            showToast('Sidebar closed');
        }
    };
    
    // Toast notification
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'mb-2 px-4 py-3 rounded-lg shadow-lg text-white bg-green-500 transform transition-all duration-300 translate-x-full';
        toast.textContent = message;
        
        const container = document.getElementById('toast-container');
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.remove('translate-x-full');
        }, 100);
        
        setTimeout(() => {
            toast.classList.add('translate-x-full');
            setTimeout(() => {
                container.removeChild(toast);
            }, 300);
        }, 3000);
    }
});
</script>
</body>
</html>
