<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Functionality Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <!-- Test Button -->
    <div class="p-8">
        <h1 class="text-2xl font-bold mb-4">Sidebar Test</h1>
        <button id="open-sidebar" class="bg-blue-500 text-white px-4 py-2 rounded">
            <i class="fas fa-bars mr-2"></i>Open Sidebar
        </button>
    </div>

    <!-- Mobile sidebar backdrop -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-gray-600 bg-opacity-75 z-40 hidden"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 z-50 w-64 h-screen bg-white border-r border-gray-200 transform -translate-x-full transition-transform duration-300 ease-in-out">
        <!-- Sidebar header -->
        <div class="flex items-center justify-between h-16 px-6 border-b border-gray-200">
            <div class="flex items-center">
                <i class="fas fa-building text-blue-600 text-xl mr-3"></i>
                <span class="text-xl font-semibold text-gray-900">Cornerstone</span>
            </div>
            <button id="close-sidebar" class="text-gray-500 hover:text-gray-700">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <!-- Navigation -->
        <nav class="p-4 space-y-2">
            <a href="/admin/dashboard" class="nav-item flex items-center px-4 py-2 text-sm font-medium rounded-lg bg-blue-50 text-blue-700">
                <i class="fas fa-home mr-3"></i>
                Dashboard
            </a>
            
            <div class="pt-4 pb-2">
                <span class="px-4 text-xs font-semibold text-gray-500 uppercase">Properties</span>
            </div>
            <a href="/admin/properties" class="nav-item flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-100">
                <i class="fas fa-building mr-3"></i>
                Properties
            </a>
            <a href="/admin/units" class="nav-item flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-100">
                <i class="fas fa-door-open mr-3"></i>
                Units
            </a>
            
            <div class="pt-4 pb-2">
                <span class="px-4 text-xs font-semibold text-gray-500 uppercase">Tenants</span>
            </div>
            <a href="/admin/tenants" class="nav-item flex items-center px-4 py-2 text-sm font-medium rounded-lg text-gray-700 hover:bg-gray-100">
                <i class="fas fa-users mr-3"></i>
                Tenants
            </a>
        </nav>
    </aside>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Sidebar functionality
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    const openBtn = document.getElementById('open-sidebar');
    const closeBtn = document.getElementById('close-sidebar');
    
    // Add debug info
    console.log('Sidebar elements found:', {
        sidebar: !!sidebar,
        backdrop: !!backdrop,
        openBtn: !!openBtn,
        closeBtn: !!closeBtn,
        sidebarClasses: sidebar?.className,
        isHidden: sidebar?.classList.contains('-translate-x-full')
    });
    
    if (openBtn) {
        openBtn.addEventListener('click', () => {
            console.log('Open button clicked');
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            showToast('Sidebar opened', 'success');
        });
    } else {
        console.error('Open button not found!');
        showToast('Open button not found', 'error');
    }
    
    if (closeBtn) {
        closeBtn.addEventListener('click', closeSidebar);
    } else {
        console.error('Close button not found!');
    }
    
    if (backdrop) {
        backdrop.addEventListener('click', closeSidebar);
    } else {
        console.error('Backdrop not found!');
    }
    
    function closeSidebar() {
        console.log('Closing sidebar');
        sidebar.classList.add('-translate-x-full');
        backdrop.classList.add('hidden');
        document.body.style.overflow = '';
        showToast('Sidebar closed', 'info');
    }
    
    // Toast notification system
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `mb-2 px-4 py-3 rounded-lg shadow-lg text-white transform transition-all duration-300 translate-x-full ${
            type === 'success' ? 'bg-green-500' : 
            type === 'error' ? 'bg-red-500' : 
            type === 'warning' ? 'bg-yellow-500' : 'bg-blue-500'
        }`;
        toast.textContent = message;
        
        const container = document.getElementById('toast-container');
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.remove('translate-x-full');
        }, 100);
        
        setTimeout(() => {
            toast.classList.add('translate-x-full');
            setTimeout(() => {
                container.removeChild(toast);
            }, 300);
        }, 3000);
    }
    
    // Initial status
    showToast('Sidebar test loaded. Click the button to test.', 'info');
});
</script>
</body>
</html>
