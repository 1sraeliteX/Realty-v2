<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Styling Test</title>
    <link rel="stylesheet" href="/assets/css/tailwind.css">
    <link rel="stylesheet" href="/assets/css/fontawesome.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <style>
        .primary-600 { color: #2563eb; }
        .bg-primary-600 { background-color: #2563eb; }
        .hover\:bg-primary-700:hover { background-color: #1d4ed8; }
        .ring-primary-500:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Dashboard Styling Test</h1>
        
        <!-- Test basic Tailwind classes -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Properties</h3>
                <p class="text-2xl font-bold text-gray-900 dark:text-white">24</p>
                <p class="text-xs text-green-600">+12.5%</p>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Total Units</h3>
                <p class="text-2xl font-bold text-gray-900 dark:text-white">156</p>
                <p class="text-xs text-blue-600">+8.3%</p>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Active Tenants</h3>
                <p class="text-2xl font-bold text-gray-900 dark:text-white">142</p>
                <p class="text-xs text-green-600">+15.2%</p>
            </div>
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">Occupancy Rate</h3>
                <p class="text-2xl font-bold text-gray-900 dark:text-white">91.2%</p>
                <p class="text-xs text-yellow-600">+2.1%</p>
            </div>
        </div>
        
        <!-- Test Font Awesome icons -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Icon Test</h3>
            <div class="flex space-x-4">
                <i class="fas fa-home text-2xl text-blue-600"></i>
                <i class="fas fa-users text-2xl text-green-600"></i>
                <i class="fas fa-dollar-sign text-2xl text-yellow-600"></i>
                <i class="fas fa-chart-bar text-2xl text-purple-600"></i>
                <i class="fas fa-cog text-2xl text-gray-600"></i>
            </div>
        </div>
        
        <!-- Test dropdown -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6 mt-6">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Dropdown Test</h3>
            <select class="text-sm border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <option value="12">Last 12 months</option>
                <option value="6">Last 6 months</option>
                <option value="3">Last 3 months</option>
            </select>
        </div>
    </div>
    
    <script>
        console.log('Dashboard styling test loaded');
        console.log('Tailwind CSS classes should be applied');
        console.log('Font Awesome icons should be visible');
        console.log('Dark mode support should be working');
    </script>
</body>
</html>
