<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Type Dropdown Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-6">Property Type Dropdown Test</h1>
        
        <form>
            <div class="mb-4">
                <label for="property_type_search" class="block text-sm font-medium text-gray-700 mb-2">
                    Property Type <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="property_type_search" 
                        name="property_type_search" 
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" 
                        placeholder="Search or select property type..."
                        autocomplete="off"
                    >
                    <input type="hidden" id="property_type" name="property_type" required value="">
                    <button type="button" id="property_type_toggle" class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    
                    <!-- Custom Dropdown -->
                    <div id="property_type_dropdown" class="absolute z-[100] w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-xl max-h-80 overflow-y-auto hidden">
                        <!-- Categories will be dynamically populated -->
                    </div>
                </div>
                <span class="text-red-500 text-sm mt-1 hidden" id="property_type_error">Property type is required</span>
            </div>
            
            <div class="mb-4">
                <p>Selected Value: <code id="selected_value" class="bg-gray-100 px-2 py-1 rounded">None</code></p>
                <p>Selected Label: <code id="selected_label" class="bg-gray-100 px-2 py-1 rounded">None</code></p>
            </div>
            
            <button type="button" onclick="testForm()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Test Selection
            </button>
        </form>
    </div>

    <script>
        // Sample property types data (matching the structure from property_types.php)
        const propertyTypes = [
            {value: 'apartment', label: 'Apartment', description: 'Self-contained housing unit within a building'},
            {value: 'detached_house', label: 'Detached House', description: 'Single-family standalone house'},
            {value: 'office_building', label: 'Office Building', description: 'Building primarily for office use'},
            {value: 'warehouse', label: 'Warehouse', description: 'Large storage facility'},
            {value: 'residential_land', label: 'Residential Land', description: 'Land zoned for residential development'},
            {value: 'mixed_use_building', label: 'Mixed Use Building', description: 'Building with multiple uses'}
        ];

        // Property Type Dropdown Functionality
        (function() {
            const searchInput = document.getElementById('property_type_search');
            const hiddenInput = document.getElementById('property_type');
            const dropdown = document.getElementById('property_type_dropdown');
            const dropdownToggle = document.getElementById('property_type_toggle');
            const errorElement = document.getElementById('property_type_error');
            
            if (!searchInput || !hiddenInput || !dropdown || !dropdownToggle) {
                console.error('Property type dropdown elements not found');
                return;
            }
            
            // Categories
            const categories = {
                'residential': {
                    label: 'Residential',
                    types: ['apartment', 'detached_house']
                },
                'commercial': {
                    label: 'Commercial',
                    types: ['office_building']
                },
                'industrial': {
                    label: 'Industrial',
                    types: ['warehouse']
                },
                'land': {
                    label: 'Land',
                    types: ['residential_land']
                },
                'mixed': {
                    label: 'Mixed Use',
                    types: ['mixed_use_building']
                }
            };
            
            let isDropdownOpen = false;
            let searchTimeout;
            
            // Initialize dropdown
            renderCategories(propertyTypes);
            
            function renderCategories(types) {
                dropdown.innerHTML = '';
                
                Object.entries(categories).forEach(([categoryKey, categoryData]) => {
                    const categoryTypes = types.filter(type => categoryData.types.includes(type.value));
                    
                    if (categoryTypes.length > 0) {
                        const categorySection = document.createElement('div');
                        categorySection.className = 'mb-2';
                        categorySection.innerHTML = `
                            <div class="px-3 py-2 bg-gray-50 text-xs font-semibold text-gray-600 uppercase tracking-wider">
                                ${categoryData.label}
                            </div>
                            <div class="category-types">
                                ${categoryTypes.map(type => `
                                    <div class="property-type-option px-3 py-2 cursor-pointer hover:bg-gray-100 rounded" 
                                         data-value="${type.value}" data-label="${type.label}">
                                        <div class="font-medium text-gray-900">${type.label}</div>
                                        ${type.description ? `<div class="text-sm text-gray-500">${type.description}</div>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        `;
                        dropdown.appendChild(categorySection);
                    }
                });
                
                // Add click handlers to all options
                dropdown.querySelectorAll('.property-type-option').forEach(option => {
                    option.addEventListener('click', function() {
                        selectPropertyType(this.dataset.value, this.dataset.label);
                    });
                });
            }
            
            function filterPropertyTypes(searchTerm) {
                const allOptions = dropdown.querySelectorAll('.property-type-option');
                
                if (!searchTerm) {
                    allOptions.forEach(option => option.classList.remove('hidden'));
                    dropdown.querySelectorAll('.mb-2').forEach(categorySection => {
                        const visibleOptions = categorySection.querySelectorAll('.property-type-option:not(.hidden)');
                        const categoryHeader = categorySection.querySelector('.bg-gray-50');
                        const categoryTypes = categorySection.querySelector('.category-types');
                        
                        if (visibleOptions.length === 0) {
                            categoryHeader.classList.add('hidden');
                            categoryTypes.classList.add('hidden');
                        } else {
                            categoryHeader.classList.remove('hidden');
                            categoryTypes.classList.remove('hidden');
                        }
                    });
                    return;
                }
                
                // Filter options
                allOptions.forEach(option => {
                    const label = option.dataset.label.toLowerCase();
                    const description = option.querySelector('.text-gray-500')?.textContent.toLowerCase() || '';
                    
                    if (label.includes(searchTerm.toLowerCase()) || description.includes(searchTerm.toLowerCase())) {
                        option.classList.remove('hidden');
                    } else {
                        option.classList.add('hidden');
                    }
                });
                
                // Hide empty categories
                dropdown.querySelectorAll('.mb-2').forEach(categorySection => {
                    const visibleOptions = categorySection.querySelectorAll('.property-type-option:not(.hidden)');
                    const categoryHeader = categorySection.querySelector('.bg-gray-50');
                    const categoryTypes = categorySection.querySelector('.category-types');
                    
                    if (visibleOptions.length === 0) {
                        categoryHeader.classList.add('hidden');
                        categoryTypes.classList.add('hidden');
                    } else {
                        categoryHeader.classList.remove('hidden');
                        categoryTypes.classList.remove('hidden');
                    }
                });
            }
            
            function toggleDropdown() {
                isDropdownOpen = !isDropdownOpen;
                if (isDropdownOpen) {
                    dropdown.classList.remove('hidden');
                    filterPropertyTypes(searchInput.value);
                } else {
                    dropdown.classList.add('hidden');
                }
                dropdownToggle.innerHTML = isDropdownOpen ? '<i class="fas fa-chevron-up"></i>' : '<i class="fas fa-chevron-down"></i>';
            }
            
            function selectPropertyType(value, label) {
                hiddenInput.value = value;
                searchInput.value = label;
                isDropdownOpen = false;
                dropdown.classList.add('hidden');
                dropdownToggle.innerHTML = '<i class="fas fa-chevron-down"></i>';
                
                // Update test display
                document.getElementById('selected_value').textContent = value;
                document.getElementById('selected_label').textContent = label;
                
                // Clear validation error
                if (errorElement) {
                    errorElement.classList.add('hidden');
                    searchInput.classList.remove('border-red-500');
                }
            }
            
            // Event listeners
            dropdownToggle.addEventListener('click', toggleDropdown);
            
            searchInput.addEventListener('focus', () => {
                if (!isDropdownOpen) {
                    toggleDropdown();
                }
            });
            
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    filterPropertyTypes(e.target.value);
                }, 150);
                
                if (hiddenInput.value && e.target.value !== searchInput.defaultValue) {
                    hiddenInput.value = '';
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.relative')) {
                    isDropdownOpen = false;
                    dropdown.classList.add('hidden');
                    dropdownToggle.innerHTML = '<i class="fas fa-chevron-down"></i>';
                }
            });
            
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    isDropdownOpen = false;
                    dropdown.classList.add('hidden');
                    searchInput.blur();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    const firstVisible = dropdown.querySelector('.property-type-option:not(.hidden)');
                    if (firstVisible) {
                        selectPropertyType(firstVisible.dataset.value, firstVisible.dataset.label);
                    }
                }
            });
        })();
        
        function testForm() {
            const value = document.getElementById('property_type').value;
            const label = document.getElementById('property_type_search').value;
            
            alert(`Selected: ${value} - ${label}`);
        }
    </script>
</body>
</html>
