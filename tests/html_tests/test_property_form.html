<!DOCTYPE html>
<html>
<head>
    <title>Property Form Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 300px; padding: 5px; }
        button { padding: 10px 20px; background: #007cba; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Property Form Submission Test</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label>Property Name:</label>
            <input type="text" name="property_name" value="Test Property" required>
        </div>
        
        <div class="form-group">
            <label>Address:</label>
            <input type="text" name="address" value="123 Test Street" required>
        </div>
        
        <div class="form-group">
            <label>Property Type:</label>
            <input type="text" name="property_type" value="apartment" required>
        </div>
        
        <div class="form-group">
            <label>Yearly Rent:</label>
            <input type="number" name="yearly_rent" value="12000" required>
        </div>
        
        <div class="form-group">
            <label>Year Built:</label>
            <input type="number" name="year_built" value="2020" required>
        </div>
        
        <div class="form-group">
            <label>Rooms:</label>
            <input type="number" name="rooms" value="2" required>
        </div>
        
        <div class="form-group">
            <label>Kitchens:</label>
            <input type="number" name="kitchens" value="1" required>
        </div>
        
        <div class="form-group">
            <label>Bathrooms:</label>
            <input type="number" name="bathrooms" value="1" required>
        </div>
        
        <div class="form-group">
            <label>Water Availability:</label>
            <select name="water_availability" required>
                <option value="in_building">In Building</option>
                <option value="borehole">Borehole</option>
                <option value="water_tank">Water Tank</option>
                <option value="none">None</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Parking:</label>
            <select name="parking" required>
                <option value="yes">Yes</option>
                <option value="no">No</option>
                <option value="limited">Limited</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Description:</label>
            <textarea name="description">Test property description</textarea>
        </div>
        
        <button type="submit">Submit Property</button>
    </form>
    
    <div id="result" class="result" style="display: none;"></div>
    
    <script>
        document.getElementById('testForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Submitting...';
            
            try {
                const response = await fetch('/properties', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                const contentType = response.headers.get('content-type');
                let data;
                
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    data = { 
                        success: response.ok, 
                        message: response.ok ? 'Property saved successfully' : 'Server error',
                        html: text.substring(0, 500) + '...'
                    };
                }
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <h3 style="color: green;">Success!</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h3 style="color: red;">Error!</h3>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h3 style="color: red;">Network Error!</h3>
                    <p>${error.message}</p>
                `;
            }
        });
    </script>
</body>
</html>
