<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Create vs Dashboard Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .bg-primary-100 { background-color: rgb(239 246 255); }
        .bg-primary-600 { background-color: rgb(37 99 235); }
        .text-primary-600 { color: rgb(37 99 235); }
        .border-primary-500 { border-color: rgb(59 130 246); }
        .focus\:ring-primary-500:focus { --tw-ring-color: rgb(59 130 246); }
        .hover\:bg-primary-700:hover { background-color: rgb(29 78 216); }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Simulate the sidebar -->
    <aside class="fixed left-0 top-0 h-screen w-64 bg-gray-800 z-20">
        <div class="p-4 text-white">Sidebar</div>
    </aside>

    <!-- Main Content -->
    <div class="ml-64 flex flex-col">
        <!-- Top Navigation -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
            <div class="flex items-center justify-between px-8 h-16">
                <!-- Breadcrumb -->
                <nav class="hidden md:flex">
                    <ol class="flex items-center space-x-2">
                        <li>
                            <a href="#" class="text-gray-500 hover:text-gray-700">
                                <i class="fas fa-home"></i>
                            </a>
                        </li>
                        <li class="flex items-center">
                            <i class="fas fa-chevron-right text-gray-400 text-xs mx-2"></i>
                            <span class="text-sm font-medium text-gray-900">Create Financial Record</span>
                        </li>
                    </ol>
                </nav>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 bg-gray-50">
            <div class="px-8 py-8">
                <!-- This matches the dashboard layout structure -->
                <div class="max-w-7xl mx-auto">
                    <!-- Header with Actions (Dashboard Style) -->
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-900">Create Financial Record</h2>
                            <p class="mt-1 text-sm text-gray-600">Add a new income or expense record</p>
                        </div>
                        <div class="mt-4 sm:mt-0">
                            <a href="#" class="inline-flex items-center px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">
                                <i class="fas fa-arrow-left mr-2"></i>
                                Back to Finances
                            </a>
                        </div>
                    </div>

                    <!-- Stats Cards (Like Dashboard) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white rounded-lg shadow p-6">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 bg-green-100 rounded-lg p-3">
                                    <i class="fas fa-trending-up text-green-600 text-xl"></i>
                                </div>
                                <div class="ml-4">
                                    <p class="text-sm font-medium text-gray-600">Total Revenue</p>
                                    <p class="text-2xl font-bold text-gray-900">₦2,450,000</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-lg shadow p-6">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 bg-blue-100 rounded-lg p-3">
                                    <i class="fas fa-dollar-sign text-blue-600 text-xl"></i>
                                </div>
                                <div class="ml-4">
                                    <p class="text-sm font-medium text-gray-600">Monthly Revenue</p>
                                    <p class="text-2xl font-bold text-gray-900">₦450,000</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-lg shadow p-6">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 bg-yellow-100 rounded-lg p-3">
                                    <i class="fas fa-calendar text-yellow-600 text-xl"></i>
                                </div>
                                <div class="ml-4">
                                    <p class="text-sm font-medium text-gray-600">Pending</p>
                                    <p class="text-2xl font-bold text-gray-900">₦125,000</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-lg shadow p-6">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 bg-red-100 rounded-lg p-3">
                                    <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                                </div>
                                <div class="ml-4">
                                    <p class="text-sm font-medium text-gray-600">Overdue</p>
                                    <p class="text-2xl font-bold text-gray-900">₦75,000</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Form Section (Dashboard Style Card) -->
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold text-gray-900 mb-4">Basic Information</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Property *</label>
                                <select class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                                    <option>Select Property</option>
                                    <option>Sunset Apartments</option>
                                    <option>Ocean View Condos</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Amount *</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">₦</span>
                                    <input type="number" placeholder="0.00" class="w-full pl-8 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
